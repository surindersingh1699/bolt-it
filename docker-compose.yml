services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: it_copilot_pg
    environment:
      POSTGRES_USER: it_copilot
      POSTGRES_PASSWORD: it_copilot
      POSTGRES_DB: it_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U it_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
